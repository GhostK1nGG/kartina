services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kartina_app
    working_dir: /var/www/html
    command: /usr/local/bin/start-app
    volumes:
      - ./src:/var/www/html:delegated
      - kartina_vendor:/var/www/html/vendor
      - kartina_storage_logs:/var/www/html/storage/logs
      - kartina_storage_cache:/var/www/html/storage/framework/cache
      - kartina_storage_sessions:/var/www/html/storage/framework/sessions
      - kartina_storage_views:/var/www/html/storage/framework/views
      - kartina_storage_testing:/var/www/html/storage/framework/testing
      - kartina_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kartina_worker
    working_dir: /var/www/html
    command: /usr/local/bin/start-worker
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html:delegated
      - kartina_vendor:/var/www/html/vendor
      - kartina_storage_logs:/var/www/html/storage/logs
      - kartina_storage_cache:/var/www/html/storage/framework/cache
      - kartina_storage_sessions:/var/www/html/storage/framework/sessions
      - kartina_storage_views:/var/www/html/storage/framework/views
      - kartina_storage_testing:/var/www/html/storage/framework/testing
      - kartina_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: kartina_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html:delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: kartina_mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: kartina_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 64M
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  kartina_vendor:
  kartina_storage_logs:
  kartina_storage_cache:
  kartina_storage_sessions:
  kartina_storage_views:
  kartina_storage_testing:
  kartina_bootstrap_cache:
